<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EkkoShop — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="auth-page">
  <div id="toast-container"></div>

  <div class="auth-layout">

    <!-- LEFT PANEL -->
    <div class="auth-visual">
      <a class="logo auth-logo" href="index.html">
        <span class="logo-mark">E</span>
        <span class="logo-text">kkoShop</span>
      </a>
      <div class="auth-visual-content">
        <div class="auth-visual-glow"></div>
        <h2>Welcome back.</h2>
        <p>Log in to access your orders, wishlist and exclusive member deals.</p>
        <div class="auth-stats">
          <div class="stat"><span class="stat-num">12k+</span><span class="stat-label">Products</span></div>
          <div class="stat"><span class="stat-num">99%</span><span class="stat-label">Happy Customers</span></div>
          <div class="stat"><span class="stat-num">24h</span><span class="stat-label">Delivery</span></div>
        </div>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="auth-form-wrap">
      <div class="auth-form-inner">
        <h1 class="auth-title">Log In</h1>
        <p class="auth-subtitle">New to EkkoShop? <a href="register.html">Create an account →</a></p>

        <form class="auth-form" id="login-form" novalidate>
          <div class="form-field">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email"/>
            <span class="field-error" id="login-email-err"></span>
          </div>

          <div class="form-field">
            <label for="login-password">
              Password
              <a class="forgot-link" href="forgot-password.html">Forgot password?</a>
            </label>
            <div class="input-with-icon">
              <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password"/>
              <button type="button" class="toggle-pw" data-target="login-password">👁</button>
            </div>
            <span class="field-error" id="login-pw-err"></span>
          </div>

          <div id="login-error" class="form-alert" style="display:none"></div>

          <button type="submit" class="btn btn-primary btn-full" id="btn-login">
            <span id="login-btn-text">Log In</span>
          </button>
        </form>

        <div class="auth-divider"><span>or continue with</span></div>
        <div class="oauth-row">
          <button class="oauth-btn" disabled title="Coming soon">
            <span>G</span> Google
          </button>
          <button class="oauth-btn" disabled title="Coming soon">
            <span>f</span> Facebook
          </button>
        </div>

        <p class="auth-footnote">
          By logging in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth/loginPage.js"></script>
</body>
</html>
